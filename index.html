<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    img {
      max-width: 100%;
      max-height: 100vh;
      object-fit: contain;
      display: block;
      border-radius: 16px;
    }
  </style>
</head>

<body>
  <img id="random-image" alt="Losowy obrazek" />

  <script>
    const numberOfImages = 34;

    const randomNumber = Math.floor(Math.random() * numberOfImages) + 1;

    const image = document.getElementById("random-image");
    image.src = `${randomNumber}.png`;
  </script>
</body>
</html>
