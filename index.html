<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    img {
      max-width: 100%;
      max-height: 100vh;
      object-fit: contain;
      display: block;
      border-radius: 16px;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
  </style>
</head>

<body>
  <img id="random-image" alt="Losowy obrazek" />

  <script>
    const numberOfImages = 34;
    const changeEverySeconds = 5;

    const image = document.getElementById("random-image");

    let currentImage = null;

    function getRandomImageNumber() {
      let newImage;

      do {
        newImage = Math.floor(Math.random() * numberOfImages) + 1;
      } while (newImage === currentImage);

      currentImage = newImage;
      return newImage;
    }

    function changeImage() {
      image.style.opacity = 0;

      setTimeout(() => {
        const randomNumber = getRandomImageNumber();
        image.src = `${randomNumber}.png`;
        image.style.opacity = 1;
      }, 500);
    }

    changeImage();

    setInterval(changeImage, changeEverySeconds * 1000);
  </script>
</body>
</html>
